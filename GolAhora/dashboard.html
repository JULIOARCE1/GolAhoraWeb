<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Panel de Control</title>
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos específicos del Dashboard -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-football-dark text-light">

    <div class="d-flex" id="wrapper">
        <!-- SIDEBAR LATERAL (Se llena dinámicamente según el rol) -->
        <div class="bg-navy border-end border-secondary border-opacity-25" id="sidebar-wrapper">
            <div class="sidebar-heading text-white fw-bold d-flex align-items-center p-3 border-bottom border-secondary border-opacity-25">
                <i class="fa-solid fa-futbol text-sports me-2"></i> GOL AHORA
            </div>
            
            <!-- Contenedor del perfil de usuario en el menú -->
            <div id="user-profile-summary" class="p-3 border-bottom border-secondary border-opacity-25 bg-dark-navy">
                <!-- Inyección JS -->
            </div>

            <!-- Lista de navegación dinámica -->
            <ul class="nav flex-column mt-2" id="sidebar-menu-items">
                <!-- Inyección JS -->
            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL DE LA PÁGINA -->
        <div id="page-content-wrapper" class="w-100 d-flex flex-column">
            <!-- Barra superior de control -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-navy border-bottom border-secondary border-opacity-25 px-4 py-2">
                <button class="btn btn-outline-success btn-sm border-sports text-sports" id="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <span class="text-light-50 position-relative cursor-pointer">
                        <i class="fa-regular fa-bell fa-lg"></i>
                        <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                    </span>
                    <div class="border-start border-secondary border-opacity-50 ps-3">
                        <span class="small text-light-75 fw-medium" id="top-navbar-user-name">Usuario</span>
                    </div>
                </div>
            </nav>

            <!-- Zona de Paneles e Información Dinámica -->
            <div class="container-fluid px-4 py-4 flex-grow-1">
                <!-- Breadcrumbs -->
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#" class="text-sports text-decoration-none">Inicio</a></li>
                        <li class="breadcrumb-item active text-light-50" aria-current="page" id="breadcrumb-current">Panel General</li>
                    </ol>
                </nav>

                <!-- CONTENEDOR DE MÉTRICAS (Cambia según el rol) -->
                <div class="row g-3 mb-4" id="metrics-container">
                    <!-- Inyección JS -->
                </div>

                <!-- CONTENEDOR DE TRABAJO PRINCIPAL (Tablas, formularios o listados) -->
                <div class="card bg-navy border-0 shadow-lg p-4" id="main-workspace-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold mb-0 text-white text-uppercase tracking-wide" id="workspace-title">Cargando Panel...</h4>
                        <div id="workspace-actions"></div>
                    </div>
                    <hr class="border-secondary border-opacity-50 my-3">
                    <div id="workspace-content">
                        <p class="text-light-50">Preparando el entorno de gestión deportiva...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 y Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bundle.min.js"></script>
    <!-- Controlador del Dashboard -->
    <script src="js/dashboard.js"></script>
</body>
</html>
