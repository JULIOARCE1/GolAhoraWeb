<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Registro de Atletas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="bg-football-dark d-flex align-items-center justify-content-center py-5 px-3">

    <div class="card login-card border-0 shadow-lg p-4 my-2">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-white text-uppercase mb-1">Creá tu Cuenta</h3>
            <p class="text-light-50 small">Formá parte de la comunidad de Gol Ahora</p>
        </div>

        <form id="form-registro" class="needs-validation" novalidate>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label for="nombre" class="form-label small fw-bold text-white">Nombre</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="nombre" required>
                </div>
                <div class="col-6">
                    <label for="apellido" class="form-label small fw-bold text-white">Apellido</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="apellido" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="dni" class="form-label small fw-bold text-white">DNI</label>
                <input type="text" class="form-control bg-football-dark border-secondary text-white" id="dni" pattern="[0-8]{7,8}" required placeholder="Sin puntos ni espacios">
                <div class="invalid-feedback">Ingresá un DNI válido (7 u 8 caracteres numéricos).</div>
            </div>

            <div class="mb-3">
                <label for="emailReg" class="form-label small fw-bold text-white">Correo Electrónico</label>
                <input type="email" class="form-control bg-football-dark border-secondary text-white" id="emailReg" required placeholder="nombre@correo.com">
            </div>

            <div class="mb-3">
                <label for="telefono" class="form-label small fw-bold text-white">Teléfono de Contacto</label>
                <input type="tel" class="form-control bg-football-dark border-secondary text-white" id="telefono" required placeholder="11 1234 5678">
            </div>

            <div class="mb-3">
                <label for="passwordReg" class="form-label small fw-bold text-white">Contraseña</label>
                <input type="password" class="form-control bg-football-dark border-secondary text-white" id="passwordReg" minlength="6" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label small fw-bold text-white">Confirmar Contraseña</label>
                <input type="password" class="form-control bg-football-dark border-secondary text-white" id="confirmPassword" required placeholder="Repetir contraseña">
                <div class="invalid-feedback" id="confirm-feedback">Las contraseñas no coinciden.</div>
            </div>

            <button type="submit" class="btn btn-sports w-100 py-2.5 fw-bold" id="btn-submit-registro">
                <span id="registro-spinner" class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                Registrarse
            </button>
        </form>

        <div class="text-center small mt-3">
            <span class="text-light-50">¿Ya tenés cuenta?</span> 
            <a href="login.html" class="text-sports fw-bold text-decoration-none ms-1">Iniciá sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
