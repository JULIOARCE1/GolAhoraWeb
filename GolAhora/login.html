<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="bg-football-dark d-flex align-items-center justify-content-center vh-100 px-3">

    <div class="card login-card border-0 shadow-lg p-4">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none text-white d-flex align-items-center justify-content-center mb-2">
                <i class="fa-solid fa-futbol text-sports fa-2x me-2"></i>
                <span class="fs-3 fw-bold text-uppercase tracking-wide">Gol Ahora</span>
            </a>
            <p class="text-light-50 small">Ingresá a tu panel de control deportivo</p>
        </div>

        <form id="form-login" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold text-white">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-football-dark border-secondary border-end-0 text-muted"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" class="form-control bg-football-dark border-secondary border-start-0 text-white ps-0" id="email" required placeholder="nombre@correo.com">
                    <div class="invalid-feedback">Ingresá un correo electrónico válido.</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label small fw-bold text-white">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-football-dark border-secondary border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control bg-football-dark border-secondary border-start-0 text-white ps-0" id="password" required placeholder="••••••••">
                    <div class="invalid-feedback">La contraseña es obligatoria.</div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 small">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input bg-football-dark border-secondary shadow-none" id="rememberMe">
                    <label class="form-check-label text-light-50" for="rememberMe">Recordarme</label>
                </div>
                <a href="#" id="btn-recover" class="text-sports fw-bold text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-sports w-100 py-2.5 fw-bold mb-3 d-flex align-items-center justify-content-center" id="btn-submit-login">
                <span id="login-spinner" class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                Ingresar
            </button>
        </form>

        <div class="text-center small mt-2">
            <span class="text-light-50">¿No tenés cuenta?</span> 
            <a href="registro.html" class="text-sports fw-bold text-decoration-none ms-1">Registrate acá</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
